services:
  - type: web
    name: esp32cam-ai-server
    env: python
    plan: free
    autoDeploy: true
    buildCommand: python -m pip install --upgrade pip setuptools wheel && python -m pip install -r requirements-render.txt && python -m pip install gunicorn
    startCommand: python -m gunicorn --workers 1 --threads 8 --timeout 120 --bind 0.0.0.0:$PORT server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
