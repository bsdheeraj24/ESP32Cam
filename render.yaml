services:
  - type: web
    name: esp32cam-ai-server
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements-render.txt
    startCommand: gunicorn --workers 1 --threads 8 --timeout 120 --bind 0.0.0.0:$PORT server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
